<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商管中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d0f14;
  --white: #161a23;
  --navy: #0a0c10;
  --navy2: #1a2235;
  --blue: #2563eb;
  --blue-light: rgba(37,99,235,0.15);
  --green: #059669;
  --green-light: rgba(5,150,105,0.15);
  --amber: #d97706;
  --amber-light: rgba(217,119,6,0.15);
  --red: #dc2626;
  --red-light: rgba(220,38,38,0.15);
  --purple: #7c3aed;
  --purple-light: rgba(124,58,237,0.15);
  --cyan: #0891b2;
  --cyan-light: rgba(8,145,178,0.15);
  --slate: #64748b;
  --border: #1e2836;
  --border2: #2a3548;
  --text: #e8edf5;
  --text2: #94a3b8;
  --text3: #4a5f78;
  --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.3);
  --shadow-lg: 0 10px 30px rgba(0,0,0,.6), 0 4px 8px rgba(0,0,0,.4);
  --r: 12px;
  --r-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── TOPBAR ── */
.topbar {
  height: 60px;
  background: #080a0e;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: relative;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.topbar-logo {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: white;
  flex-shrink: 0;
}
.topbar-title { color: white; font-size: 15px; font-weight: 700; }
.topbar-sub { color: rgba(255,255,255,.45); font-size: 12px; margin-top: 1px; }
.topbar-nav {
  display: flex;
  gap: 2px;
  margin-left: auto;
}
.topbar-nav-btn {
  padding: 7px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,.6);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all .15s;
}
.topbar-nav-btn:hover { background: rgba(255,255,255,.08); color: white; }
.topbar-nav-btn.active { background: rgba(255,255,255,.12); color: white; }

/* ── LAYOUT ── */
.layout { display: flex; height: calc(100vh - 60px); overflow: hidden; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 20px 12px;
  position: sticky;
  top: 0;
  height: calc(100vh - 60px);
  overflow-y: auto;
  align-self: flex-start;
}
.sidebar-section {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 0 8px;
  margin: 20px 0 6px;
}
.sidebar-section:first-child { margin-top: 0; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 10px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  text-align: left;
  transition: all .15s;
}
.nav-btn:hover { background: var(--bg); color: var(--text); }
.nav-btn.active { background: var(--blue-light); color: var(--blue); font-weight: 600; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-count {
  margin-left: auto;
  background: var(--border);
  color: var(--text3);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
}
.nav-btn.active .nav-count { background: rgba(37,99,235,.15); color: var(--blue); }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; min-width: 0; height: 100%; }
.page { display: none; padding: 24px 28px; }
.page.active { display: block; }

/* ── PAGE HEADER ── */
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
}
.page-head-left h1 { font-size: 25px; font-weight: 700; color: var(--text); line-height: 1.2; }
.page-head-left p { font-size: 14px; color: var(--text3); margin-top: 3px; }

/* ── KPI ROW ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--white);
  border-radius: var(--r);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border2); }
.kpi-accent {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: var(--r) 0 0 var(--r);
}
.kpi.blue .kpi-accent { background: var(--blue); }
.kpi.green .kpi-accent { background: var(--green); }
.kpi.amber .kpi-accent { background: var(--amber); }
.kpi.red .kpi-accent { background: var(--red); }
.kpi.purple .kpi-accent { background: var(--purple); }
.kpi-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: .04em; padding-left: 4px; }
.kpi-val { font-size: 34px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; line-height: 1; padding-left: 4px; }
.kpi-sub { font-size: 12px; color: var(--text3); padding-left: 4px; }

/* ── CHART GRID ── */
.chart-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--white);
  border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .05em;
  color: var(--text2);
  text-transform: uppercase;
}
.card-body { padding: 16px 20px; }
.card-body-sm { padding: 12px 16px; }

canvas { max-height: 180px; }

/* ── STATUS BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-green::before { background: var(--green); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-red::before { background: var(--red); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-amber::before { background: var(--amber); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-blue::before { background: var(--blue); }
.badge-purple { background: var(--purple-light); color: var(--purple); }
.badge-purple::before { background: var(--purple); }
.badge-cyan { background: var(--cyan-light); color: var(--cyan); }
.badge-cyan::before { background: var(--cyan); }
.badge-slate { background: #f1f5f9; color: var(--slate); }
.badge-slate::before { background: var(--slate); }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.search-wrap {
  flex: 1; min-width: 220px;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
}
.search-wrap input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  box-shadow: var(--shadow);
}
.search-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.filter-sel {
  padding: 9px 12px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  box-shadow: var(--shadow);
  cursor: pointer;
}
.filter-sel:focus { border-color: var(--blue); }
.result-count { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }

/* ── STATUS CHIPS ── */
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--text2);
  transition: all .15s;
  font-family: 'Noto Sans TC', sans-serif;
  display: flex; align-items: center; gap: 6px;
}
.chip:hover { border-color: var(--blue); color: var(--blue); }
.chip.chip-active { border-color: var(--blue); background: var(--blue-light); color: var(--blue); font-weight: 600; }
.chip-num { font-family: 'DM Mono', monospace; font-size: 11px; }

/* ── CONTRACT CARDS ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.contract-card {
  background: var(--white);
  border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 18px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.contract-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--border2); }
.contract-card.urgent { border-left: 3px solid var(--red); }
.contract-card.warning { border-left: 3px solid var(--amber); }
.contract-card.normal { border-left: 3px solid transparent; }
.contract-card.inactive { border-left: 3px solid var(--slate); opacity: .8; }

.cc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.cc-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
.cc-id { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.cc-badge { flex-shrink: 0; }

.cc-divider { height: 1px; background: var(--border); margin: 10px 0; }

.cc-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cc-item { }
.cc-item-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: .04em; margin-bottom: 2px; }
.cc-item-val { font-size: 14px; color: var(--text); font-weight: 500; }
.cc-item-val.mono { font-family: 'DM Mono', monospace; font-size: 13px; }
.cc-item-val.highlight { color: var(--blue); font-weight: 700; }

.cc-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.cc-footer-label { font-size: 10px; color: var(--text3); }
.cc-footer-date { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text2); }

/* ── PAGINATION ── */
.pg { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 24px 0 8px; }
.pg-btn {
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  font-family: 'DM Mono', monospace;
  box-shadow: var(--shadow);
}
.pg-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.pg-btn.pg-active { background: var(--blue); border-color: var(--blue); color: white; }
.pg-btn:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }
.pg-info { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; padding: 0 8px; }



/* ── OPERATOR CARDS ── */
.op-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}
.op-card {
  background: var(--white);
  border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: all .2s;
}
.op-card:hover { box-shadow: var(--shadow-md); }
.op-card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  user-select: none;
}
.op-card-header:hover { background: rgba(255,255,255,.03); }
.op-expand-icon {
  margin-left: auto;
  font-size: 16px;
  color: var(--text3);
  transition: transform .25s;
  flex-shrink: 0;
}
.op-card.expanded .op-expand-icon { transform: rotate(180deg); }
.op-locations {
  display: none;
  border-top: 1px solid var(--border);
  padding: 12px 18px 14px;
  background: rgba(0,0,0,.15);
}
.op-card.expanded .op-locations { display: block; }
.op-locations-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}
.op-loc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 6px;
}
.op-loc-item {
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.3;
  cursor: pointer;
  transition: all .15s;
}
.op-loc-item:hover {
  background: rgba(37,99,235,.12);
  border-color: var(--blue);
  color: var(--blue);
}
.op-rank-num {
  font-size: 24px;
  font-weight: 900;
  font-family: 'DM Mono', monospace;
  color: var(--border2);
  min-width: 32px;
  text-align: center;
  line-height: 1;
}
.op-rank-num.gold { color: #f59e0b; }
.op-rank-num.silver { color: #94a3b8; }
.op-rank-num.bronze { color: #b45309; }
.op-info { flex: 1; min-width: 0; }
.op-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
.op-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }
.op-pill {
  background: var(--blue-light);
  color: var(--blue);
  font-size: 13px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

/* ── EXPIRY LIST ── */
.expiry-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.expiry-item:last-child { border-bottom: none; }
.expiry-name { font-size: 14px; font-weight: 600; color: var(--text); }
.expiry-vendor { font-size: 12px; color: var(--text3); margin-top: 2px; }
.expiry-right { text-align: right; flex-shrink: 0; }
.expiry-date { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text2); margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 16px;
  width: 540px;
  max-width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }
.modal-head {
  padding: 22px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px;
}
.modal-head-name { font-size: 19px; font-weight: 700; color: var(--text); }
.modal-head-id { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.modal-close-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  color: var(--text3);
  flex-shrink: 0;
  transition: all .15s;
}
.modal-close-btn:hover { background: var(--bg); color: var(--text); }
.modal-body { padding: 20px 24px; }
.modal-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 12px; margin-top: 20px;
}
.modal-section-title:first-child { margin-top: 0; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: .04em; }
.form-input, .form-sel {
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--white);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.form-input:focus, .form-sel:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.form-input[readonly] { background: var(--bg); color: var(--text3); cursor: not-allowed; }
.modal-foot {
  padding: 14px 24px 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
}
.btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Noto Sans TC', sans-serif; transition: all .15s; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { background: var(--bg); color: var(--text); border-color: var(--border2); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #080a0e; color: white;
  padding: 12px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; z-index: 300;
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-lg);
  opacity: 0; transform: translateY(12px);
  transition: all .3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-icon { font-size: 16px; }

/* ── MISC ── */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }
.section-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 24px; }

@media (max-width: 720px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .chart-row, .section-row { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

.btn-export {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.75);
  padding: 6px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .15s;
  margin-left: 10px;
}
.btn-export:hover { border-color: rgba(255,255,255,.5); color: white; background: rgba(255,255,255,.07); }
.export-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #1a2030;
  border: 1px solid #2a3548;
  border-radius: 10px;

}

.export-item {

.export-icon {

</style>

<!-- Loading Overlay -->
<div id="loading-overlay" style="
  position:fixed;inset:0;background:rgba(10,12,16,.88);
  z-index:999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;">
  <div style="width:44px;height:44px;border:3px solid #1e2836;
    border-top-color:#2563eb;border-radius:50%;
    animation:spin .8s linear infinite;"></div>
  <div id="loading-msg" style="font-size:14px;color:#94a3b8;font-family:'Noto Sans TC',sans-serif;"></div>
  <button id="loading-retry" onclick="init()" style="
    display:none;padding:8px 18px;background:#2563eb;color:white;
    border:none;border-radius:8px;font-size:13px;cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;font-weight:600;">重新載入</button>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
// ── Google Sheets Web App URL ──────────────────────────
// 填入你的 Apps Script 部署網址
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbww17n9qBMPasT9XpccSsuyqz0toc60GyoYLEFph9w0TTdfXQV8tTpYmV3LxqNA4U-1DQ/exec';

let contracts = [], shops = [], parkings = [], operators = [];
let filteredCt = [], ctPage = 1, ctPageSz = 24;
let filteredSh = [], shPage = 1, shPageSz = 24;
let chipStatus = '';
let editCtx = null; // { dataset, idx }

const STATUS_CFG = {
  '履約中':     { cls: 'badge-green', chip: '#059669' },
  '3個月內屆期': { cls: 'badge-red',   chip: '#dc2626' },
  '6個月內屆期': { cls: 'badge-amber', chip: '#d97706' },
  '招商中':     { cls: 'badge-blue',   chip: '#2563eb' },
  '決標未點交': { cls: 'badge-purple', chip: '#7c3aed' },
  '點交待竣工': { cls: 'badge-cyan',   chip: '#0891b2' },
  '已終止':     { cls: 'badge-slate',  chip: '#64748b' },
};
const cardClass = s => s === '3個月內屆期' ? 'urgent' : s === '6個月內屆期' ? 'warning' : (s === '已終止' ? 'inactive' : 'normal');

// ── Loading State ─────────────────────────────────────
function showLoading(msg) {
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('loading-msg').textContent = msg || '載入中…';
}
function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
}

// ── Fetch from Google Sheets ────────────────────────
async function init() {
  showLoading('正在從 Google Sheets 載入資料…');
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=all', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (!d.success) throw new Error(d.error || '讀取失敗');

    contracts = d.contracts || [];
    shops     = d.shops     || [];
    operators = d.operators || [];

    hideLoading();
    buildOverview(d.stats);
    buildContractFilters();
    buildShopFilters();
    buildOperators();
    filteredCt = [...contracts];
    filteredSh = [...shops];
    renderCt();
    renderSh();

    // Show last updated
    if (d.lastUpdated) {
      const dt = new Date(d.lastUpdated);
      document.getElementById('last-updated').textContent =
        '資料更新：' + dt.toLocaleDateString('zh-TW') + ' ' + dt.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});
    }
  } catch (err) {
    hideLoading();
    showError(err.message);
  }
}

function showError(msg) {
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('loading-msg').textContent = '⚠ 無法連線：' + msg;
  document.getElementById('loading-msg').style.color = '#ef4444';
  document.getElementById('loading-retry').style.display = 'inline-flex';
}

// ── Write back to Google Sheets ─────────────────────
async function writeBack(dataset, rowIndex, data) {
  if (!rowIndex) return; // 沒有 _rowIndex 就跳過
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateRow', dataset, rowIndex, data }),
    });
    const result = await res.json();
    if (!result.success) throw new Error(result.error);
  } catch (err) {
    console.error('寫回失敗：', err);
    // 不阻斷流程，本地已更新
  }
}

// ─── OVERVIEW ───────────────────────────────────────
function buildOverview(stats) {
  if (!stats) return;
  document.getElementById('kpi-total').textContent = stats.total_contracts;
  document.getElementById('kpi-active').textContent = stats.status_counts['履約中'] || 0;
  document.getElementById('kpi-3m').textContent = stats.status_counts['3個月內屆期'] || 0;
  document.getElementById('kpi-6m').textContent = stats.status_counts['6個月內屆期'] || 0;
  document.getElementById('kpi-rev').textContent = Math.round(stats.total_monthly_revenue / 10000).toLocaleString();

  // Status doughnut
  const sc = stats.status_counts;
  const sKeys = Object.keys(sc);
  new Chart(document.getElementById('chart-status'), {
    type: 'doughnut',
    data: {
      labels: sKeys,
      datasets: [{ data: sKeys.map(k => sc[k]), backgroundColor: sKeys.map(k => (STATUS_CFG[k]||{chip:'#94a3b8'}).chip), borderWidth: 3, borderColor: '#fff', hoverOffset: 4 }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11, family: 'Noto Sans TC' }, padding: 10, boxWidth: 10 } } }, cutout: '55%' }
  });

  // Label pie
  const lc = stats.label_counts;
  const lKeys = Object.keys(lc);
  const pieColors = ['#2563eb','#0891b2','#059669','#d97706','#7c3aed','#dc2626','#64748b','#f97316'];
  new Chart(document.getElementById('chart-label'), {
    type: 'pie',
    data: { labels: lKeys, datasets: [{ data: lKeys.map(k => lc[k]), backgroundColor: pieColors, borderWidth: 3, borderColor: '#fff' }] },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11, family: 'Noto Sans TC' }, padding: 8, boxWidth: 10 } } } }
  });

  // Line bar
  const mainLines = ['1文湖線','2淡水信義線','3松山新店線','4中和新蘆線','5板南線'];
  const lineCounts = mainLines.map(k => stats.line_counts[k] || 0);
  new Chart(document.getElementById('chart-line'), {
    type: 'bar',
    data: {
      labels: mainLines.map(l => l.replace(/^\d/, '')),
      datasets: [{ data: lineCounts, backgroundColor: ['#2563eb','#dc2626','#059669','#7c3aed','#d97706'], borderRadius: 5, borderSkipped: false }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#1e2836' }, ticks: { font: { size: 11 } } },
        y: { grid: { display: false }, ticks: { font: { size: 11, family: 'Noto Sans TC' } } }
      }
    }
  });

  // Expiry list
  const expiring = contracts.filter(c => c['好用表 狀態'] && c['好用表 狀態'].includes('屆期'));
  const el = document.getElementById('expiry-list');
  el.innerHTML = expiring.slice(0, 15).map(c => `
    <div class="expiry-item">
      <div>
        <div class="expiry-name">${c['標的拆分'] || '—'}</div>
        <div class="expiry-vendor">${c['契約廠商'] || '—'}</div>
      </div>
      <div class="expiry-right">
        <span class="badge ${(STATUS_CFG[c['好用表 狀態']]||{cls:'badge-slate'}).cls}">${c['好用表 狀態']}</span>
        <div class="expiry-date">${c['國曆 結束'] || '—'}</div>
      </div>
    </div>`).join('') || '<div class="empty">無即將屆期項目</div>';

  // Bidding list
  const bidding = contracts.filter(c => c['好用表 狀態'] === '招商中' || c['好用表 狀態'] === '決標未點交');
  const bl = document.getElementById('bidding-list');
  bl.innerHTML = bidding.slice(0, 15).map(c => `
    <div class="expiry-item">
      <div>
        <div class="expiry-name">${c['標的拆分'] || '—'}</div>
        <div class="expiry-vendor">${c['標的拆分 路線'] || '—'}</div>
      </div>
      <div class="expiry-right">
        <span class="badge ${(STATUS_CFG[c['好用表 狀態']]||{cls:'badge-slate'}).cls}">${c['好用表 狀態']}</span>
      </div>
    </div>`).join('') || '<div class="empty">無進行中招商</div>';
}

// ─── CONTRACTS ──────────────────────────────────────
function buildContractFilters() {
  // Chips
  const statusOrder = ['履約中','6個月內屆期','3個月內屆期','招商中','決標未點交','點交待竣工','已終止'];
  const chips = document.getElementById('status-chips');
  chips.innerHTML = statusOrder.map(s => {
    const cnt = contracts.filter(c => c['好用表 狀態'] === s).length;
    if (!cnt) return '';
    const col = (STATUS_CFG[s]||{chip:'#94a3b8'}).chip;
    return `<div class="chip" data-s="${s}" onclick="setChip('${s}',this)" style="--c:${col}">
      <span style="width:6px;height:6px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0;"></span>
      ${s} <span class="chip-num">${cnt}</span>
    </div>`;
  }).join('') + `<div class="chip" data-s="" onclick="setChip('',this)">全部 <span class="chip-num">${contracts.length}</span></div>`;

  const lines = [...new Set(contracts.map(c => c['標的拆分 路線']).filter(Boolean))].sort();
  const fl = document.getElementById('fl-line');
  lines.forEach(l => fl.innerHTML += `<option value="${l}">${l}</option>`);

  const labels = [...new Set(contracts.map(c => c['標的拆分 標籤']).filter(Boolean))].sort();
  const flab = document.getElementById('fl-label');
  labels.forEach(l => flab.innerHTML += `<option value="${l}">${l}</option>`);

  const cities = [...new Set(contracts.map(c => c['臺北 新北']).filter(Boolean))].sort();
  const fc = document.getElementById('fl-city');
  cities.forEach(c => fc.innerHTML += `<option value="${c}">${c}</option>`);
}

function setChip(s, el) {
  chipStatus = (chipStatus === s && s !== '') ? '' : s;
  document.querySelectorAll('#status-chips .chip').forEach(c => c.classList.remove('chip-active'));
  if (chipStatus !== '' || s === '') el.classList.add('chip-active');
  document.getElementById('fl-line').value = ''; // reset other filters for clarity
  filterCt();
}

function filterCt() {
  const q = document.getElementById('srch-ct').value.toLowerCase();
  const line = document.getElementById('fl-line').value;
  const label = document.getElementById('fl-label').value;
  const city = document.getElementById('fl-city').value;
  filteredCt = contracts.filter(c => {
    if (chipStatus && c['好用表 狀態'] !== chipStatus) return false;
    if (line && c['標的拆分 路線'] !== line) return false;
    if (label && c['標的拆分 標籤'] !== label) return false;
    if (city && c['臺北 新北'] !== city) return false;
    if (q) {
      const txt = [c['標的拆分'],c['契約廠商'],c['契約案號'],c['車站 不分線']].join(' ').toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });
  ctPage = 1;
  renderCt();
}

function renderCt() {
  const total = filteredCt.length;
  const pages = Math.ceil(total / ctPageSz) || 1;
  ctPage = Math.min(ctPage, pages);
  const slice = filteredCt.slice((ctPage-1)*ctPageSz, ctPage*ctPageSz);
  document.getElementById('ct-count').textContent = `共 ${total} 件`;
  document.getElementById('side-ct').textContent = total;

  document.getElementById('ct-grid').innerHTML = slice.map((c, i) => {
    const idx = contracts.indexOf(c);
    const status = c['好用表 狀態'] || '';
    const badgeCls = (STATUS_CFG[status]||{cls:'badge-slate'}).cls;
    const cc = cardClass(status);
    const amt = c['金額 拆分'] ? '$' + Math.round(c['金額 拆分']).toLocaleString() : '—';
    const sz = c['坪數 拆分'] ? parseFloat(c['坪數 拆分']).toFixed(1) + ' 坪' : '—';
    const eff = c['坪效 (不含分潤)'] ? Math.round(c['坪效 (不含分潤)']).toLocaleString() : '—';
    return `<div class="contract-card ${cc}" onclick="openModal(${idx},'contracts')">
      <div class="cc-top">
        <div>
          <div class="cc-name">${c['標的拆分'] || '—'}</div>
          <div class="cc-id">${c['標的拆分 排序編號'] || ''}</div>
        </div>
        <div class="cc-badge"><span class="badge ${badgeCls}">${status}</span></div>
      </div>
      <div class="cc-meta">
        <div class="cc-item">
          <div class="cc-item-label">廠商</div>
          <div class="cc-item-val">${trunc(c['契約廠商'],10)}</div>
        </div>
        <div class="cc-item">
          <div class="cc-item-label">路線</div>
          <div class="cc-item-val" style="color:var(--text3);font-size:12px;">${c['標的拆分 路線'] || '—'}</div>
        </div>
        <div class="cc-item">
          <div class="cc-item-label">坪數</div>
          <div class="cc-item-val mono">${sz}</div>
        </div>
        <div class="cc-item">
          <div class="cc-item-label">月租金</div>
          <div class="cc-item-val mono highlight">${amt}</div>
        </div>
      </div>
      <div class="cc-footer">
        <div class="cc-footer-label">契約結束</div>
        <div class="cc-footer-date">${c['國曆 結束'] || '—'}</div>
      </div>
    </div>`;
  }).join('') || '<div class="empty" style="grid-column:1/-1">沒有符合條件的契約</div>';

  renderPg('ct-pg', ctPage, pages, p => { ctPage = p; renderCt(); });
}

// ─── SHOPS ──────────────────────────────────────────
function buildShopFilters() {
  const statuses = [...new Set(shops.map(s => s['【契約】 狀態']).filter(Boolean))];
  const fs = document.getElementById('fl-sh-status');
  statuses.forEach(s => fs.innerHTML += `<option value="${s}">${s}</option>`);

  const lines = [...new Set(shops.map(s => s['【空間】 路線']).filter(Boolean))].sort();
  const fl = document.getElementById('fl-sh-line');
  lines.forEach(l => fl.innerHTML += `<option value="${l}">${l}</option>`);
}

function filterSh() {
  const q = document.getElementById('srch-sh').value.toLowerCase();
  const status = document.getElementById('fl-sh-status').value;
  const line = document.getElementById('fl-sh-line').value;
  filteredSh = shops.filter(s => {
    if (status && s['【契約】 狀態'] !== status) return false;
    if (line && s['【空間】 路線'] !== line) return false;
    if (q) {
      const txt = [s['【空間】編號'], s['【契約】廠商'], s['【空間】 路線']].join(' ').toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });
  shPage = 1;
  renderSh();
}

function renderSh() {
  const total = filteredSh.length;
  const pages = Math.ceil(total / shPageSz) || 1;
  shPage = Math.min(shPage, pages);
  const slice = filteredSh.slice((shPage-1)*shPageSz, shPage*shPageSz);
  document.getElementById('sh-count').textContent = `共 ${total} 件`;

  document.getElementById('sh-grid').innerHTML = slice.map((s, i) => {
    const idx = shops.indexOf(s);
    const status = s['【契約】 狀態'] || '';
    const badgeCls = (STATUS_CFG[status]||{cls:'badge-slate'}).cls;
    const cc = cardClass(status);
    const amt = s['【空間】 金額'] ? '$' + Math.round(s['【空間】 金額']).toLocaleString() : '—';
    const sz = s['【空間】 坪數'] ? parseFloat(s['【空間】 坪數']).toFixed(1) + ' 坪' : '—';
    const eff = s['【空間】 坪效'] ? Math.round(s['【空間】 坪效']).toLocaleString() : '—';
    return `<div class="contract-card ${cc}" onclick="openModal(${idx},'shops')">
      <div class="cc-top">
        <div>
          <div class="cc-name">${s['【空間】編號'] || '—'}</div>
          <div class="cc-id">${s['【空間】 路線'] || ''}</div>
        </div>
        <div class="cc-badge"><span class="badge ${badgeCls}">${status}</span></div>
      </div>
      <div class="cc-meta">
        <div class="cc-item">
          <div class="cc-item-label">廠商</div>
          <div class="cc-item-val">${trunc(s['【契約】廠商'],10)}</div>
        </div>
        <div class="cc-item">
          <div class="cc-item-label">坪效</div>
          <div class="cc-item-val mono">${eff}</div>
        </div>
        <div class="cc-item">
          <div class="cc-item-label">坪數</div>
          <div class="cc-item-val mono">${sz}</div>
        </div>
        <div class="cc-item">
          <div class="cc-item-label">月租金</div>
          <div class="cc-item-val mono highlight">${amt}</div>
        </div>
      </div>
      <div class="cc-footer">
        <div class="cc-footer-label">契約期間</div>
        <div class="cc-footer-date">${s['【契約】 開始'] || '—'} ～ ${s['【契約】 結束'] || '—'}</div>
      </div>
    </div>`;
  }).join('') || '<div class="empty" style="grid-column:1/-1">沒有符合條件的資料</div>';

  renderPg('sh-pg', shPage, pages, p => { shPage = p; renderSh(); });
}


// ─── OPERATORS ───────────────────────────────────────
function buildOperators() {
  document.getElementById('op-grid').innerHTML = operators.map((op, i) => {
    const name = op['實際經營廠商'] || op[Object.keys(op)[0]] || '—';
    const cnt = op['點位數'] || op[Object.keys(op)[1]] || 0;
    const detail = op['點位詳情'] || '';
    const locs = detail ? detail.split('\n').filter(Boolean) : [];
    const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const locItems = locs.map(l => `<div class="op-loc-item" onclick="jumpToShop('${l.replace(/'/g,"\'")}',event)">${l}</div>`).join('');
    return `<div class="op-card" id="op-${i}">
      <div class="op-card-header" onclick="toggleOp(${i})">
        <div class="op-rank-num ${rankCls}">${i+1}</div>
        <div class="op-info">
          <div class="op-name">${name}</div>
          <div class="op-detail">點位 ${cnt} 處</div>
        </div>
        <div class="op-pill">${cnt}</div>
        ${locs.length ? '<div class="op-expand-icon">▾</div>' : ''}
      </div>
      ${locs.length ? `<div class="op-locations">
        <div class="op-locations-title">管理點位（${locs.length} 處）</div>
        <div class="op-loc-grid">${locItems}</div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggleOp(i) {
  const card = document.getElementById('op-' + i);
  card.classList.toggle('expanded');
}

function jumpToShop(name, e) {
  e.stopPropagation();
  // Switch to shops page and search
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn, .topbar-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-shops').classList.add('active');
  document.querySelectorAll('.topbar-nav-btn').forEach(b => {
    if (b.textContent.trim() === '販賣店') b.classList.add('active');
  });
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.includes('販賣店')) b.classList.add('active');
  });
  // Search for the location
  const srch = document.getElementById('srch-sh');
  // Extract station name (remove 號販賣店 etc)
  const stationMatch = name.match(/^(.+?站)/);
  srch.value = stationMatch ? stationMatch[1] : name;
  filterSh();
  // Scroll to top of main
  document.querySelector('.main').scrollTo(0, 0);
  showJumpToast(name);
}

function showJumpToast(name) {
  const t = document.getElementById('toast');
  t.querySelector('.toast-icon').textContent = '🔍';
  const node = t.childNodes[1];
  if (node) node.textContent = ' 跳轉至：' + name;
  t.classList.add('show');
  setTimeout(() => {
    t.classList.remove('show');
    t.querySelector('.toast-icon').textContent = '✓';
    if (node) node.textContent = ' 已儲存成功';
  }, 2500);
}

// ─── MODAL ──────────────────────────────────────────
function openModal(idx, dataset) {
  editCtx = { idx, dataset };
  const dataMap = { contracts, shops, parkings };
  const item = dataMap[dataset][idx];
  const keys = Object.keys(item);

  // Config per dataset
  const cfgs = {
    contracts: {
      name: item['標的拆分'] || '—',
      id: item['標的拆分 排序編號'] || '',
      readonly: ['標的拆分 排序編號','標的拆分 路線','車站 不分線','契約案號','契約標的','契約 坪數','坪效 (不含分潤)'],
      editable: ['契約廠商','好用表 狀態','坪數 拆分','金額 拆分','國曆 起始','國曆 結束','契約 註記'],
    },
    shops: {
      name: item['【空間】編號'] || '—',
      id: item['【空間】 路線'] || '',
      readonly: ['【空間】 路線','【空間】 坪效'],
      editable: ['【契約】廠商','【契約】 狀態','【空間】 坪數','【空間】 金額','【契約】 開始','【契約】 結束'],
    }
  };
  const cfg = cfgs[dataset];

  document.getElementById('m-name').textContent = cfg.name;
  document.getElementById('m-id').textContent = cfg.id;

  const statusOpts = Object.keys(STATUS_CFG).map(s => `<option ${s === item['好用表 狀態'] || s === item['【契約】 狀態'] ? 'selected' : ''} value="${s}">${s}</option>`).join('');

  const mkField = (k, readonly) => {
    const v = item[k] ?? '';
    const isStatus = k.includes('狀態');
    if (readonly) {
      return `<div class="form-group"><div class="form-label">${k}</div><input class="form-input" readonly value="${v}"></div>`;
    }
    if (isStatus) {
      return `<div class="form-group"><div class="form-label">${k}</div><select class="form-sel" data-key="${k}">${statusOpts}</select></div>`;
    }
    return `<div class="form-group"><div class="form-label">${k}</div><input class="form-input" data-key="${k}" value="${v}"></div>`;
  };

  document.getElementById('m-readonly').innerHTML = cfg.readonly.filter(k => k in item).map(k => mkField(k, true)).join('');
  const editHtml = cfg.editable.filter(k => k in item).map(k => mkField(k, false));
  // Make notes/remark full width
  document.getElementById('m-edit').innerHTML = editHtml.join('');

  document.getElementById('modal').classList.add('open');
}

function maybeClose(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editCtx = null;
}

async function saveModal() {
  if (!editCtx) return;
  const dataMap = { contracts, shops, parkings };
  const item = dataMap[editCtx.dataset][editCtx.idx];
  const updatedFields = {};
  document.querySelectorAll('#m-edit [data-key]').forEach(inp => {
    item[inp.dataset.key] = inp.value;
    updatedFields[inp.dataset.key] = inp.value;
  });
  const rowIndex = item._rowIndex;
  const ds = editCtx.dataset;
  closeModal();
  if (ds === 'contracts') renderCt();
  else if (ds === 'shops') renderSh();

  const t = document.getElementById('toast');
  t.querySelector('.toast-icon').textContent = '⏳';
  t.childNodes[1].textContent = ' 正在寫回 Google Sheets…';
  t.classList.add('show');

  await writeBack(ds, rowIndex, updatedFields);

  t.querySelector('.toast-icon').textContent = '✓';
  t.childNodes[1].textContent = ' 已同步到 Google Sheets';
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── UTILS ───────────────────────────────────────────
function trunc(s, n) { if (!s) return '—'; return s.length > n ? s.slice(0, n) + '…' : s; }

function renderPg(id, cur, total, cb) {
  const ct = document.getElementById(id);
  if (total <= 1) { ct.innerHTML = ''; return; }
  const mkBtn = (label, page, active, disabled) =>
    `<button class="pg-btn ${active?'pg-active':''}" ${disabled?'disabled':''} onclick="(${cb})(${page})">${label}</button>`;
  let html = mkBtn('‹', cur-1, false, cur <= 1);
  const pages = [];
  if (total <= 7) for (let i=1;i<=total;i++) pages.push(i);
  else {
    pages.push(1);
    if (cur > 3) pages.push('…');
    for (let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++) pages.push(i);
    if (cur < total-2) pages.push('…');
    pages.push(total);
  }
  pages.forEach(p => {
    if (p==='…') html += `<span class="pg-info">…</span>`;
    else html += mkBtn(p, p, p===cur, false);
  });
  html += mkBtn('›', cur+1, false, cur >= total);
  ct.innerHTML = html;
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn, .topbar-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  // Highlight both sidebar and topbar
  document.querySelectorAll('.nav-btn, .topbar-nav-btn').forEach(b => {
    if (b.textContent.trim().startsWith(el.textContent.trim().slice(0,2))) b.classList.add('active');
  });
  el.classList.add('active');
}


// ─── EXPORT ─────────────────────────────────────────
function toggleExport(e) {
  e.stopPropagation();
  document.getElementById('export-menu').classList.toggle('open');
}
document.addEventListener('click', () => {
  document.getElementById('export-menu').classList.remove('open');
});

function exportJSON() {
  const payload = {
    exportedAt: new Date().toISOString(),
    contracts,
    shops,
    operators
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  triggerDownload(blob, '商管中心資料_' + dateStr() + '.json');
  showExportToast('JSON');
}

function exportCSV(dataset) {
  const dataMap = { contracts, shops, parkings };
  const rows = dataMap[dataset];
  if (!rows || !rows.length) return;
  const keys = Object.keys(rows[0]);
  const csvRows = [keys.map(k => '"' + String(k).replace(/"/g,'""') + '"').join(',')];
  rows.forEach(row => {
    csvRows.push(keys.map(k => {
      const v = row[k] ?? '';
      return '"' + String(v).replace(/"/g,'""') + '"';
    }).join(','));
  });
  const BOM = '\uFEFF'; // UTF-8 BOM for Excel
  const blob = new Blob([BOM + csvRows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const nameMap = { contracts: '契約', shops: '販賣店' };
  triggerDownload(blob, '商管中心_' + nameMap[dataset] + '_' + dateStr() + '.csv');
  showExportToast('CSV');
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('export-menu').classList.remove('open');
}

function dateStr() {
  const d = new Date();
  return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
}

function showExportToast(type) {
  const t = document.getElementById('toast');
  t.querySelector('.toast-icon').textContent = '↓';
  t.querySelector('.toast-icon').nextSibling.textContent = ' 已匯出 ' + type + ' 檔案';
  t.classList.add('show');
  setTimeout(() => {
    t.classList.remove('show');
    t.querySelector('.toast-icon').textContent = '✓';
  }, 2500);
}

// 不自動載入，等使用者按刷新
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('last-updated').textContent = '請按刷新載入資料';
});
</script>
