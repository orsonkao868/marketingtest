<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活事業處商管中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0f14;
  --surface: #161a23;
  --surface2:#1e2530;
  --border:  #1e2836;
  --border2: #2a3548;
  --text:    #e8edf5;
  --text2:   #94a3b8;
  --text3:   #4a5f78;
  --blue:    #2563eb;
  --green:   #059669;
  --amber:   #d97706;
  --red:     #dc2626;
  --purple:  #7c3aed;
  --cyan:    #0891b2;
  --slate:   #64748b;
  --r: 10px;
  --r-sm: 7px;
  --shadow: 0 1px 4px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ─────────────────────────────── */
.topbar {
  height: 56px;
  min-height: 56px;
  background: #080a0e;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  z-index: 10;
  flex-shrink: 0;
  overflow: hidden;
}
.topbar-logo {
  width: 34px; height: 34px;
  background: var(--blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.topbar-info { flex-shrink: 1; min-width: 0; overflow: hidden; }
.topbar-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.topbar-nav {
  display: flex;
  gap: 1px;
  margin-left: 6px;
  flex-shrink: 0;
}
.tnav-btn {
  padding: 6px 10px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,.5);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all .15s;
  white-space: nowrap;
}
.tnav-btn:hover { background: rgba(255,255,255,.07); color: #fff; }
.tnav-btn.active { background: rgba(255,255,255,.1); color: #fff; }

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.refresh-btn {
  padding: 6px 13px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,.65);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.15);
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.refresh-btn:hover { border-color: rgba(255,255,255,.4); color: #fff; }

.export-wrap { position: relative; }
.export-btn {
  padding: 6px 13px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,.65);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.15);
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all .15s;
}
.export-btn:hover { border-color: rgba(255,255,255,.4); color: #fff; }
.export-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  box-shadow: var(--shadow-md);
  padding: 6px;
  min-width: 200px;
  z-index: 100;
}
.export-menu.open { display: block; }
.export-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 11px;
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: background .15s;
}
.export-item:hover { background: rgba(255,255,255,.05); color: var(--text); }
.export-item-icon { font-size: 15px; }

/* ── BODY LAYOUT ─────────────────────────── */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ─────────────────────────────── */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sidebar-section {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 4px 8px;
  margin-top: 14px;
  margin-bottom: 2px;
}
.sidebar-section:first-child { margin-top: 0; }
.snav-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 9px 10px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  text-align: left;
  transition: all .15s;
}
.snav-btn:hover { background: rgba(255,255,255,.05); color: var(--text); }
.snav-btn.active { background: rgba(37,99,235,.15); color: var(--blue); font-weight: 600; }
.snav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.snav-badge {
  margin-left: auto;
  background: var(--border2);
  color: var(--text3);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
}
.snav-btn.active .snav-badge { background: rgba(37,99,235,.2); color: var(--blue); }

/* ── MAIN ────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
}

/* ── PAGES ───────────────────────────────── */
.page { display: none; padding: 24px; }
.page.active { display: block; }

.page-head { margin-bottom: 20px; }
.page-head h1 { font-size: 20px; font-weight: 700; color: var(--text); }
.page-head p { font-size: 13px; color: var(--text3); margin-top: 3px; }

/* ── KPI ROW ─────────────────────────────── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.kpi-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.kpi.blue  .kpi-bar { background: var(--blue); }
.kpi.green .kpi-bar { background: var(--green); }
.kpi.red   .kpi-bar { background: var(--red); }
.kpi.amber .kpi-bar { background: var(--amber); }
.kpi.purple .kpi-bar { background: var(--purple); }
.kpi-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: .04em; margin-bottom: 6px; }
.kpi-val { font-size: 28px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── CHARTS ──────────────────────────────── */
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.card-head {
  padding: 13px 16px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text3);
}
.card-body { padding: 14px 16px; }
canvas { max-height: 200px; }

.two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 20px; }

/* ── STATUS BADGE ────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.b-green  { background: rgba(5,150,105,.15);  color: var(--green);  }
.b-green::before  { background: var(--green);  }
.b-red    { background: rgba(220,38,38,.15);   color: var(--red);    }
.b-red::before    { background: var(--red);    }
.b-amber  { background: rgba(217,119,6,.15);   color: var(--amber);  }
.b-amber::before  { background: var(--amber);  }
.b-blue   { background: rgba(37,99,235,.15);   color: var(--blue);   }
.b-blue::before   { background: var(--blue);   }
.b-purple { background: rgba(124,58,237,.15);  color: var(--purple); }
.b-purple::before { background: var(--purple); }
.b-cyan   { background: rgba(8,145,178,.15);   color: var(--cyan);   }
.b-cyan::before   { background: var(--cyan);   }
.b-slate  { background: rgba(100,116,139,.15); color: var(--slate);  }
.b-slate::before  { background: var(--slate);  }

/* ── EXPIRY LIST ─────────────────────────── */
.expiry-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px;
}
.expiry-item:last-child { border-bottom: none; }
.expiry-name { font-size: 13px; font-weight: 600; color: var(--text); }
.expiry-vendor { font-size: 11px; color: var(--text3); margin-top: 2px; }
.expiry-right { text-align: right; flex-shrink: 0; }
.expiry-date { font-size: 11px; color: var(--text2); margin-top: 4px; font-family: 'DM Mono', monospace; }

/* ── FILTER BAR ──────────────────────────── */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center; margin-bottom: 14px;
}
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--blue); }
.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
  pointer-events: none;
}
.fsel {
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  cursor: pointer;
}
.fsel:focus { border-color: var(--blue); }
.result-count { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }

/* ── STATUS CHIPS ────────────────────────── */
.chip-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
.chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border-radius: 20px;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  transition: all .15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.chip:hover { border-color: var(--blue); color: var(--blue); }
.chip.chip-on { border-color: var(--blue); background: rgba(37,99,235,.12); color: var(--blue); font-weight: 600; }
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.chip-num { font-family: 'DM Mono', monospace; font-size: 11px; }

/* ── CONTRACT CARDS ──────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 12px;
}
.cc {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  border-left-width: 3px;
}
.cc:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.cc.urgent { border-left-color: var(--red); }
.cc.warning { border-left-color: var(--amber); }
.cc.normal { border-left-color: var(--border); }
.cc.inactive { border-left-color: var(--slate); opacity: .75; }

.cc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.cc-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
.cc-id { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }

.cc-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.cc-field-label { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 2px; }
.cc-field-val { font-size: 13px; color: var(--text); }
.cc-field-val.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
.cc-field-val.hi { color: var(--blue); font-weight: 700; }

.cc-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3);
}
.cc-foot-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }

/* ── PAGINATION ──────────────────────────── */
.pg { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 20px 0 8px; }
.pg-btn {
  min-width: 32px; height: 32px; padding: 0 6px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  font-family: 'DM Mono', monospace;
  display: flex; align-items: center; justify-content: center;
}
.pg-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.pg-btn.on { background: var(--blue); border-color: var(--blue); color: #fff; }
.pg-btn:disabled { opacity: .3; cursor: not-allowed; }

/* ── OPERATOR CARDS ──────────────────────── */
.op-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
.op-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.op-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background .15s;
}
.op-header:hover { background: rgba(255,255,255,.03); }
.op-rank { font-size: 22px; font-weight: 900; font-family: 'DM Mono', monospace; color: var(--border2); min-width: 30px; line-height: 1; }
.op-rank.gold { color: #f59e0b; }
.op-rank.silver { color: #94a3b8; }
.op-rank.bronze { color: #b45309; }
.op-name { font-size: 13px; font-weight: 700; flex: 1; }
.op-pill { background: rgba(37,99,235,.15); color: var(--blue); font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; font-family: 'DM Mono', monospace; }
.op-chevron { color: var(--text3); transition: transform .2s; font-size: 14px; }
.op-card.open .op-chevron { transform: rotate(180deg); }
.op-locs { display: none; border-top: 1px solid var(--border); padding: 12px 16px; background: rgba(0,0,0,.15); }
.op-card.open .op-locs { display: block; }
.op-locs-title { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.op-loc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 5px; }
.op-loc-item {
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 6px 9px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.op-loc-item:hover { background: rgba(37,99,235,.12); border-color: var(--blue); color: var(--blue); }

/* ── MODAL ───────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(3px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 520px;
  max-width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-md);
  animation: mIn .2s ease;
}
@keyframes mIn { from { opacity:0; transform:scale(.96) translateY(8px); } to { opacity:1; transform:none; } }
.modal-head {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  padding: 20px 22px 14px;
  border-bottom: 1px solid var(--border);
}
.modal-head-name { font-size: 16px; font-weight: 700; }
.modal-head-id { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.modal-close:hover { background: rgba(255,255,255,.06); color: var(--text); }
.modal-body { padding: 18px 22px; }
.modal-section { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; margin-top: 18px; }
.modal-section:first-child { margin-top: 0; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1/-1; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text3); }
.form-input, .form-sel {
  padding: 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color .15s;
}
.form-input:focus, .form-sel:focus { border-color: var(--blue); }
.form-input[readonly] { opacity: .5; cursor: not-allowed; }
.modal-foot {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 14px 22px 18px;
  border-top: 1px solid var(--border);
}
.btn { padding: 8px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Noto Sans TC', sans-serif; transition: all .15s; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { background: rgba(255,255,255,.05); color: var(--text); }

/* ── LOADING ─────────────────────────────── */
.loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(13,15,20,.9);
  z-index: 300;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 42px; height: 42px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 14px; color: var(--text2); }
.loading-retry {
  display: none;
  padding: 8px 18px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
}

/* ── TOAST ───────────────────────────────── */
.toast {
  position: fixed;
  bottom: 22px; right: 22px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 11px 18px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  z-index: 400;
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transform: translateY(10px);
  transition: all .25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

.empty { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; grid-column: 1/-1; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .kpi-row .kpi:last-child:nth-child(odd) { grid-column: 1 / -1; }
  .chart-row { grid-template-columns: 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .topbar-nav { margin-left: 4px; }
  .tnav-btn { padding: 5px 7px; font-size: 12px; }
  .btn-label { display: none; }
  .refresh-btn, .export-btn { padding: 6px 8px; font-size: 16px; }
  .topbar-right { gap: 4px; }
  .topbar-info .topbar-sub { display: none; }
  .cards-grid { grid-template-columns: 1fr; }
  .op-grid { grid-template-columns: 1fr; }
  .export-menu { right: 0; min-width: 180px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">捷</div>
  <div class="topbar-info">
    <div class="topbar-title">生活事業處商管中心</div>
    <div class="topbar-sub" id="last-updated">請按刷新載入資料</div>
  </div>
  <div class="topbar-nav">
    <button class="tnav-btn active" onclick="showPage('overview',this)">總覽</button>
    <button class="tnav-btn" onclick="showPage('contracts',this)">契約</button>
    <button class="tnav-btn" onclick="showPage('shops',this)">販賣店</button>
    <button class="tnav-btn" onclick="showPage('operators',this)">廠商</button>
  </div>
  <div class="topbar-right">
    <button class="refresh-btn" onclick="loadData()"><span class="btn-icon">↺</span><span class="btn-label"> 刷新</span></button>
    <div class="export-wrap">
      <button class="export-btn" onclick="toggleExport(event)"><span class="btn-icon">↓</span><span class="btn-label"> 匯出</span></button>
      <div class="export-menu" id="export-menu">
        <div class="export-item" onclick="exportJSON()"><span class="export-item-icon">{ }</span> 匯出 JSON</div>
        <div class="export-item" onclick="exportCSV('contracts')"><span class="export-item-icon">📋</span> 契約 CSV</div>
        <div class="export-item" onclick="exportCSV('shops')"><span class="export-item-icon">🏪</span> 販賣店 CSV</div>
      </div>
    </div>
  </div>
</div>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section">主要功能</div>
    <button class="snav-btn active" onclick="showPage('overview',this)">
      <span class="snav-icon">◈</span> 總覽儀表板
    </button>
    <button class="snav-btn" onclick="showPage('contracts',this)">
      <span class="snav-icon">📋</span> 契約管理
      <span class="snav-badge" id="badge-ct">—</span>
    </button>
    <button class="snav-btn" onclick="showPage('shops',this)">
      <span class="snav-icon">🏪</span> 販賣店
      <span class="snav-badge" id="badge-sh">—</span>
    </button>
    <div class="sidebar-section">其他</div>
    <button class="snav-btn" onclick="showPage('operators',this)">
      <span class="snav-icon">🏢</span> 經營廠商
    </button>
  </nav>

  <!-- MAIN -->
  <div class="main">

    <!-- OVERVIEW -->
    <div id="page-overview" class="page active">
      <div class="page-head">
        <h1>總覽儀表板</h1>
        <p>全線商業空間資訊彙整</p>
      </div>
      <div class="kpi-row">
        <div class="kpi blue"><div class="kpi-bar"></div><div class="kpi-label">契約總數</div><div class="kpi-val" id="kpi-total">—</div><div class="kpi-sub">所有標的</div></div>
        <div class="kpi green"><div class="kpi-bar"></div><div class="kpi-label">正常履約</div><div class="kpi-val" id="kpi-active">—</div><div class="kpi-sub">履約中</div></div>
        <div class="kpi red"><div class="kpi-bar"></div><div class="kpi-label">3個月內屆期</div><div class="kpi-val" id="kpi-3m">—</div><div class="kpi-sub">需優先處理</div></div>
        <div class="kpi amber"><div class="kpi-bar"></div><div class="kpi-label">6個月內屆期</div><div class="kpi-val" id="kpi-6m">—</div><div class="kpi-sub">請留意</div></div>
        <div class="kpi purple"><div class="kpi-bar"></div><div class="kpi-label">月租金合計</div><div class="kpi-val" id="kpi-rev">—</div><div class="kpi-sub">萬元</div></div>
      </div>
      <div class="chart-row">
        <div class="card"><div class="card-head">契約狀態分佈</div><div class="card-body"><canvas id="chart-status"></canvas></div></div>
        <div class="card"><div class="card-head">標的類型</div><div class="card-body"><canvas id="chart-label"></canvas></div></div>
        <div class="card"><div class="card-head">路線別件數</div><div class="card-body"><canvas id="chart-line"></canvas></div></div>
      </div>
      <div class="two-col">
        <div class="card"><div class="card-head">即將屆期預警</div><div class="card-body" id="expiry-list" style="max-height:280px;overflow-y:auto;"></div></div>
        <div class="card"><div class="card-head">招商進行中</div><div class="card-body" id="bidding-list" style="max-height:280px;overflow-y:auto;"></div></div>
      </div>
    </div>

    <!-- CONTRACTS -->
    <div id="page-contracts" class="page">
      <div class="page-head"><h1>契約管理</h1><p>點擊卡片可查看詳情及編輯</p></div>
      <div class="chip-row" id="status-chips"></div>
      <div class="filter-bar">
        <div class="search-wrap"><input type="text" id="srch-ct" placeholder="搜尋車站、廠商、案號…" oninput="filterCt()"></div>
        <select class="fsel" id="fl-line" onchange="filterCt()"><option value="">全部路線</option></select>
        <select class="fsel" id="fl-label" onchange="filterCt()"><option value="">全部標的</option></select>
        <span class="result-count" id="ct-count"></span>
      </div>
      <div class="cards-grid" id="ct-grid"></div>
      <div class="pg" id="ct-pg"></div>
    </div>

    <!-- SHOPS -->
    <div id="page-shops" class="page">
      <div class="page-head"><h1>販賣店一覽</h1><p>點擊卡片可查看詳情及編輯</p></div>
      <div class="filter-bar">
        <div class="search-wrap"><input type="text" id="srch-sh" placeholder="搜尋空間編號、廠商…" oninput="filterSh()"></div>
        <select class="fsel" id="fl-sh-status" onchange="filterSh()"><option value="">全部狀態</option></select>
        <select class="fsel" id="fl-sh-line" onchange="filterSh()"><option value="">全部路線</option></select>
        <span class="result-count" id="sh-count"></span>
      </div>
      <div class="cards-grid" id="sh-grid"></div>
      <div class="pg" id="sh-pg"></div>
    </div>

    <!-- OPERATORS -->
    <div id="page-operators" class="page">
      <div class="page-head"><h1>經營廠商</h1><p>依管理點位數量排序，點擊展開點位清單</p></div>
      <div class="op-grid" id="op-grid"></div>
    </div>

  </div><!-- /main -->
</div><!-- /app-body -->

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="maybeClose(event)">
  <div class="modal">
    <div class="modal-head">
      <div><div class="modal-head-name" id="m-name"></div><div class="modal-head-id" id="m-id"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">唯讀資訊</div>
      <div class="form-grid" id="m-readonly"></div>
      <div class="modal-section">可編輯欄位</div>
      <div class="form-grid" id="m-edit"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveModal()">儲存變更</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">正在從 Google Sheets 載入資料…</div>
  <button class="loading-retry" id="loading-retry" onclick="loadData()">重新載入</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toast-icon">✓</span><span id="toast-msg"> 已儲存</span></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbww17n9qBMPasT9XpccSsuyqz0toc60GyoYLEFph9w0TTdfXQV8tTpYmV3LxqNA4U-1DQ/exec';

let contracts = [], shops = [], operators = [];
let filteredCt = [], ctPage = 1;
let filteredSh = [], shPage = 1;
const PAGE_SZ = 24;
let chipStatus = '';
let editCtx = null;
let charts = {};

const STATUS_CFG = {
  '履約中':     { cls: 'b-green',  dot: '#059669', cc: 'normal'   },
  '3個月內屆期':{ cls: 'b-red',    dot: '#dc2626', cc: 'urgent'   },
  '6個月內屆期':{ cls: 'b-amber',  dot: '#d97706', cc: 'warning'  },
  '招商中':     { cls: 'b-blue',   dot: '#2563eb', cc: 'normal'   },
  '決標未點交': { cls: 'b-purple', dot: '#7c3aed', cc: 'normal'   },
  '點交待竣工': { cls: 'b-cyan',   dot: '#0891b2', cc: 'normal'   },
  '已終止':     { cls: 'b-slate',  dot: '#64748b', cc: 'inactive' },
};
const getBadge = s => {
  const c = STATUS_CFG[s] || { cls: 'b-slate', dot: '#64748b', cc: 'normal' };
  return { ...c };
};

// ── LOAD ─────────────────────────────────────────────
async function loadData() {
  showLoading('正在從 Google Sheets 載入資料…');
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=all&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (!d.success) throw new Error(d.error || '讀取失敗');

    contracts = d.contracts || [];
    shops     = d.shops     || [];
    operators = d.operators || [];

    hideLoading();

    // Destroy old charts
    Object.values(charts).forEach(c => c.destroy());
    charts = {};

    buildOverview(d.stats);
    buildContractFilters();
    buildShopFilters();
    buildOperators();
    filteredCt = [...contracts];
    filteredSh = [...shops];
    renderCt();
    renderSh();

    document.getElementById('badge-ct').textContent = contracts.length;
    document.getElementById('badge-sh').textContent = shops.length;

    if (d.lastUpdated) {
      const dt = new Date(d.lastUpdated);
      document.getElementById('last-updated').textContent =
        '資料更新：' + dt.toLocaleDateString('zh-TW') + ' ' + dt.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    }
  } catch (err) {
    showError(err.message);
  }
}

// ── OVERVIEW ─────────────────────────────────────────
function buildOverview(stats) {
  if (!stats) return;
  document.getElementById('kpi-total').textContent = stats.total_contracts;
  document.getElementById('kpi-active').textContent = stats.status_counts['履約中'] || 0;
  document.getElementById('kpi-3m').textContent = stats.status_counts['3個月內屆期'] || 0;
  document.getElementById('kpi-6m').textContent = stats.status_counts['6個月內屆期'] || 0;
  document.getElementById('kpi-rev').textContent = Math.round((stats.total_monthly_revenue || 0) / 10000).toLocaleString();

  const sc = stats.status_counts || {};
  const sKeys = Object.keys(sc);
  charts.status = new Chart(document.getElementById('chart-status'), {
    type: 'doughnut',
    data: {
      labels: sKeys,
      datasets: [{ data: sKeys.map(k => sc[k]), backgroundColor: sKeys.map(k => (STATUS_CFG[k]||{dot:'#94a3b8'}).dot), borderWidth: 2, borderColor: '#161a23', hoverOffset: 4 }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11, family: 'Noto Sans TC' }, boxWidth: 10, padding: 8 } } }, cutout: '55%' }
  });

  const lc = stats.label_counts || {};
  const lKeys = Object.keys(lc);
  const pieColors = ['#2563eb','#0891b2','#059669','#d97706','#7c3aed','#dc2626','#64748b','#f97316'];
  charts.label = new Chart(document.getElementById('chart-label'), {
    type: 'pie',
    data: { labels: lKeys, datasets: [{ data: lKeys.map(k => lc[k]), backgroundColor: pieColors, borderWidth: 2, borderColor: '#161a23' }] },
    options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11, family: 'Noto Sans TC' }, boxWidth: 10, padding: 8 } } } }
  });

  const mainLines = ['1文湖線','2淡水信義線','3松山新店線','4中和新蘆線','5板南線'];
  const lnc = stats.line_counts || {};
  charts.line = new Chart(document.getElementById('chart-line'), {
    type: 'bar',
    data: {
      labels: mainLines.map(l => l.replace(/^\d/, '')),
      datasets: [{ data: mainLines.map(k => lnc[k] || 0), backgroundColor: ['#2563eb','#dc2626','#059669','#7c3aed','#d97706'], borderRadius: 4, borderSkipped: false }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#1e2836' }, ticks: { color: '#94a3b8', font: { size: 11 } } },
        y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11, family: 'Noto Sans TC' } } }
      }
    }
  });

  const expiring = contracts.filter(c => c['好用表 狀態'] && c['好用表 狀態'].includes('屆期'));
  document.getElementById('expiry-list').innerHTML = expiring.slice(0, 15).map(c => {
    const b = getBadge(c['好用表 狀態']);
    return `<div class="expiry-item">
      <div><div class="expiry-name">${c['標的拆分'] || '—'}</div><div class="expiry-vendor">${c['契約廠商'] || '—'}</div></div>
      <div class="expiry-right"><span class="badge ${b.cls}">${c['好用表 狀態']}</span><div class="expiry-date">${c['國曆 結束'] || '—'}</div></div>
    </div>`;
  }).join('') || '<div style="color:var(--text3);font-size:13px;padding:8px;">無即將屆期項目</div>';

  const bidding = contracts.filter(c => ['招商中','決標未點交'].includes(c['好用表 狀態']));
  document.getElementById('bidding-list').innerHTML = bidding.slice(0, 15).map(c => {
    const b = getBadge(c['好用表 狀態']);
    return `<div class="expiry-item">
      <div><div class="expiry-name">${c['標的拆分'] || '—'}</div><div class="expiry-vendor">${c['標的拆分 路線'] || '—'}</div></div>
      <div class="expiry-right"><span class="badge ${b.cls}">${c['好用表 狀態']}</span></div>
    </div>`;
  }).join('') || '<div style="color:var(--text3);font-size:13px;padding:8px;">無進行中招商</div>';
}

// ── CONTRACTS ────────────────────────────────────────
function buildContractFilters() {
  const statusOrder = ['履約中','6個月內屆期','3個月內屆期','招商中','決標未點交','點交待竣工','已終止'];
  const chips = document.getElementById('status-chips');
  chips.innerHTML = statusOrder.map(s => {
    const cnt = contracts.filter(c => c['好用表 狀態'] === s).length;
    if (!cnt) return '';
    const dot = (STATUS_CFG[s]||{dot:'#94a3b8'}).dot;
    return `<div class="chip" data-s="${s}" onclick="setChip('${s}',this)"><div class="chip-dot" style="background:${dot}"></div>${s}<span class="chip-num">${cnt}</span></div>`;
  }).join('') + `<div class="chip chip-on" onclick="setChip('',this)">全部<span class="chip-num">${contracts.length}</span></div>`;

  const lines = [...new Set(contracts.map(c => c['標的拆分 路線']).filter(Boolean))].sort();
  const fl = document.getElementById('fl-line');
  fl.innerHTML = '<option value="">全部路線</option>';
  lines.forEach(l => fl.innerHTML += `<option value="${l}">${l}</option>`);

  const labels = [...new Set(contracts.map(c => c['標的拆分 標籤']).filter(Boolean))].sort();
  const flab = document.getElementById('fl-label');
  flab.innerHTML = '<option value="">全部標的</option>';
  labels.forEach(l => flab.innerHTML += `<option value="${l}">${l}</option>`);
}

function setChip(s, el) {
  chipStatus = (chipStatus === s && s !== '') ? '' : s;
  document.querySelectorAll('#status-chips .chip').forEach(c => c.classList.remove('chip-on'));
  el.classList.add('chip-on');
  filterCt();
}

function filterCt() {
  const q = document.getElementById('srch-ct').value.toLowerCase();
  const line = document.getElementById('fl-line').value;
  const label = document.getElementById('fl-label').value;
  filteredCt = contracts.filter(c => {
    if (chipStatus && c['好用表 狀態'] !== chipStatus) return false;
    if (line && c['標的拆分 路線'] !== line) return false;
    if (label && c['標的拆分 標籤'] !== label) return false;
    if (q) {
      const txt = [c['標的拆分'],c['契約廠商'],c['契約案號'],c['車站 不分線']].join(' ').toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });
  ctPage = 1;
  renderCt();
}

function renderCt() {
  const total = filteredCt.length;
  const pages = Math.ceil(total / PAGE_SZ) || 1;
  ctPage = Math.min(ctPage, pages);
  const slice = filteredCt.slice((ctPage-1)*PAGE_SZ, ctPage*PAGE_SZ);
  document.getElementById('ct-count').textContent = `共 ${total} 件`;

  document.getElementById('ct-grid').innerHTML = slice.map(c => {
    const idx = contracts.indexOf(c);
    const s = c['好用表 狀態'] || '';
    const b = getBadge(s);
    const amt = c['金額 拆分'] ? '$' + Math.round(c['金額 拆分']).toLocaleString() : '—';
    const sz = c['坪數 拆分'] ? parseFloat(c['坪數 拆分']).toFixed(1) + ' 坪' : '—';
    return `<div class="cc ${b.cc}" onclick="openModal(${idx},'contracts')">
      <div class="cc-top">
        <div><div class="cc-name">${c['標的拆分']||'—'}</div><div class="cc-id">${c['標的拆分 排序編號']||''}</div></div>
        <span class="badge ${b.cls}">${s}</span>
      </div>
      <div class="cc-meta">
        <div><div class="cc-field-label">廠商</div><div class="cc-field-val">${trunc(c['契約廠商'],10)}</div></div>
        <div><div class="cc-field-label">路線</div><div class="cc-field-val" style="color:var(--text3);font-size:12px;">${c['標的拆分 路線']||'—'}</div></div>
        <div><div class="cc-field-label">坪數</div><div class="cc-field-val mono">${sz}</div></div>
        <div><div class="cc-field-label">月租金</div><div class="cc-field-val mono hi">${amt}</div></div>
      </div>
      <div class="cc-foot"><span>契約結束</span><span class="cc-foot-date">${c['國曆 結束']||'—'}</span></div>
    </div>`;
  }).join('') || '<div class="empty">沒有符合條件的契約</div>';

  renderPg('ct-pg', ctPage, pages, p => { ctPage = p; renderCt(); });
}

// ── SHOPS ────────────────────────────────────────────
function buildShopFilters() {
  const statuses = [...new Set(shops.map(s => s['【契約】 狀態']).filter(Boolean))];
  const fs = document.getElementById('fl-sh-status');
  fs.innerHTML = '<option value="">全部狀態</option>';
  statuses.forEach(s => fs.innerHTML += `<option value="${s}">${s}</option>`);

  const lines = [...new Set(shops.map(s => s['【空間】 路線']).filter(Boolean))].sort();
  const fl = document.getElementById('fl-sh-line');
  fl.innerHTML = '<option value="">全部路線</option>';
  lines.forEach(l => fl.innerHTML += `<option value="${l}">${l}</option>`);
}

function filterSh() {
  const q = document.getElementById('srch-sh').value.toLowerCase();
  const status = document.getElementById('fl-sh-status').value;
  const line = document.getElementById('fl-sh-line').value;
  filteredSh = shops.filter(s => {
    if (status && s['【契約】 狀態'] !== status) return false;
    if (line && s['【空間】 路線'] !== line) return false;
    if (q) {
      const txt = [s['【空間】編號'], s['【契約】廠商'], s['【空間】 路線']].join(' ').toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });
  shPage = 1;
  renderSh();
}

function renderSh() {
  const total = filteredSh.length;
  const pages = Math.ceil(total / PAGE_SZ) || 1;
  shPage = Math.min(shPage, pages);
  const slice = filteredSh.slice((shPage-1)*PAGE_SZ, shPage*PAGE_SZ);
  document.getElementById('sh-count').textContent = `共 ${total} 件`;

  document.getElementById('sh-grid').innerHTML = slice.map(s => {
    const idx = shops.indexOf(s);
    const status = s['【契約】 狀態'] || '';
    const b = getBadge(status);
    const amt = s['【空間】 金額'] ? '$' + Math.round(s['【空間】 金額']).toLocaleString() : '—';
    const sz = s['【空間】 坪數'] ? parseFloat(s['【空間】 坪數']).toFixed(1) + ' 坪' : '—';
    const eff = s['【空間】 坪效'] ? Math.round(s['【空間】 坪效']).toLocaleString() : '—';
    return `<div class="cc ${b.cc}" onclick="openModal(${idx},'shops')">
      <div class="cc-top">
        <div><div class="cc-name">${s['【空間】編號']||'—'}</div><div class="cc-id">${s['【空間】 路線']||''}</div></div>
        <span class="badge ${b.cls}">${status}</span>
      </div>
      <div class="cc-meta">
        <div><div class="cc-field-label">廠商</div><div class="cc-field-val">${trunc(s['【契約】廠商'],10)}</div></div>
        <div><div class="cc-field-label">坪效</div><div class="cc-field-val mono">${eff}</div></div>
        <div><div class="cc-field-label">坪數</div><div class="cc-field-val mono">${sz}</div></div>
        <div><div class="cc-field-label">月租金</div><div class="cc-field-val mono hi">${amt}</div></div>
      </div>
      <div class="cc-foot"><span>契約期間</span><span class="cc-foot-date">${s['【契約】 開始']||'—'} ～ ${s['【契約】 結束']||'—'}</span></div>
    </div>`;
  }).join('') || '<div class="empty">沒有符合條件的資料</div>';

  renderPg('sh-pg', shPage, pages, p => { shPage = p; renderSh(); });
}

// ── OPERATORS ────────────────────────────────────────
function buildOperators() {
  document.getElementById('op-grid').innerHTML = operators.map((op, i) => {
    const name = op['實際經營廠商'] || '—';
    const cnt = op['點位數'] || 0;
    const locs = (op['點位詳情'] || '').split('\n').filter(Boolean);
    const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    return `<div class="op-card" id="op-${i}">
      <div class="op-header" onclick="toggleOp(${i})">
        <div class="op-rank ${rankCls}">${i+1}</div>
        <div class="op-name">${name}</div>
        <div class="op-pill">${cnt}</div>
        ${locs.length ? '<div class="op-chevron">▾</div>' : ''}
      </div>
      ${locs.length ? `<div class="op-locs">
        <div class="op-locs-title">管理點位（${locs.length} 處）</div>
        <div class="op-loc-grid">${locs.map(l => `<div class="op-loc-item" onclick="jumpToShop('${l.replace(/'/g,"\\'")}')">${l}</div>`).join('')}</div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggleOp(i) { document.getElementById('op-' + i).classList.toggle('open'); }

function jumpToShop(name) {
  showPage('shops', document.querySelector('.tnav-btn:nth-child(3)'));
  const m = name.match(/^(.+?站)/);
  document.getElementById('srch-sh').value = m ? m[1] : name;
  filterSh();
  document.querySelector('.main').scrollTo(0, 0);
  showToast('🔍', ' 跳轉至：' + name);
}

// ── MODAL ────────────────────────────────────────────
function openModal(idx, dataset) {
  editCtx = { idx, dataset };
  const dataMap = { contracts, shops };
  const item = dataMap[dataset][idx];

  const cfgs = {
    contracts: {
      name: item['標的拆分'] || '—', id: item['標的拆分 排序編號'] || '',
      readonly: ['標的拆分 排序編號','標的拆分 路線','車站 不分線','契約案號'],
      editable: ['契約廠商','好用表 狀態','坪數 拆分','金額 拆分','國曆 起始','國曆 結束','契約 註記'],
    },
    shops: {
      name: item['【空間】編號'] || '—', id: item['【空間】 路線'] || '',
      readonly: ['【空間】 路線','【空間】 坪效'],
      editable: ['【契約】廠商','【契約】 狀態','【空間】 坪數','【空間】 金額','【契約】 開始','【契約】 結束'],
    },
  };
  const cfg = cfgs[dataset];
  document.getElementById('m-name').textContent = cfg.name;
  document.getElementById('m-id').textContent = cfg.id;

  const statusOpts = Object.keys(STATUS_CFG).map(s =>
    `<option value="${s}" ${s === (item['好用表 狀態']||item['【契約】 狀態']) ? 'selected' : ''}>${s}</option>`
  ).join('');

  const mkField = (k, ro) => {
    const v = item[k] ?? '';
    if (!ro && k.includes('狀態'))
      return `<div class="form-group"><div class="form-label">${k}</div><select class="form-sel" data-key="${k}">${statusOpts}</select></div>`;
    return `<div class="form-group"><div class="form-label">${k}</div><input class="form-input" data-key="${k}" value="${String(v).replace(/"/g,'&quot;')}" ${ro ? 'readonly' : ''}></div>`;
  };

  document.getElementById('m-readonly').innerHTML = cfg.readonly.filter(k => k in item).map(k => mkField(k, true)).join('');
  document.getElementById('m-edit').innerHTML = cfg.editable.filter(k => k in item).map(k => mkField(k, false)).join('');

  document.getElementById('modal').classList.add('open');
}

function maybeClose(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); editCtx = null; }

async function saveModal() {
  if (!editCtx) return;
  const dataMap = { contracts, shops };
  const item = dataMap[editCtx.dataset][editCtx.idx];
  const updated = {};
  document.querySelectorAll('#m-edit [data-key]').forEach(inp => {
    item[inp.dataset.key] = inp.value;
    updated[inp.dataset.key] = inp.value;
  });
  const rowIndex = item._rowIndex;
  const ds = editCtx.dataset;
  closeModal();
  if (ds === 'contracts') renderCt(); else renderSh();

  showToast('⏳', ' 正在寫回 Google Sheets…');
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateRow', dataset: ds, rowIndex, data: updated }),
    });
    const r = await res.json();
    if (!r.success) throw new Error(r.error);
    showToast('✓', ' 已同步到 Google Sheets');
  } catch (err) {
    showToast('✓', ' 已儲存（本機）');
  }
}

// ── EXPORT ───────────────────────────────────────────
function toggleExport(e) {
  e.stopPropagation();
  document.getElementById('export-menu').classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('export-menu').classList.remove('open'));

function exportJSON() {
  const blob = new Blob([JSON.stringify({ exportedAt: new Date().toISOString(), contracts, shops, operators }, null, 2)], { type: 'application/json' });
  dl(blob, '商管中心_' + dateStr() + '.json');
}
function exportCSV(dataset) {
  const rows = { contracts, shops }[dataset];
  if (!rows?.length) return;
  const keys = Object.keys(rows[0]).filter(k => k !== '_rowIndex');
  const csv = [keys.map(k => '"' + k.replace(/"/g,'""') + '"').join(','),
    ...rows.map(r => keys.map(k => '"' + String(r[k]??'').replace(/"/g,'""') + '"').join(','))].join('\n');
  dl(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), '商管中心_' + dataset + '_' + dateStr() + '.csv');
  document.getElementById('export-menu').classList.remove('open');
}
function dl(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}
function dateStr() { const d = new Date(); return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2); }

// ── HELPERS ──────────────────────────────────────────
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tnav-btn, .snav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  el.classList.add('active');
  // sync sidebar and topbar
  const label = el.textContent.trim().slice(0, 2);
  document.querySelectorAll('.tnav-btn, .snav-btn').forEach(b => {
    if (b.textContent.trim().startsWith(label)) b.classList.add('active');
  });
}

function trunc(s, n) { if (!s) return '—'; return s.length > n ? s.slice(0, n) + '…' : s; }

function renderPg(id, cur, total, cb) {
  const ct = document.getElementById(id);
  if (total <= 1) { ct.innerHTML = ''; return; }
  let html = `<button class="pg-btn" ${cur<=1?'disabled':''} onclick="(${cb})(${cur-1})">‹</button>`;
  const pages = [];
  if (total <= 7) { for (let i=1;i<=total;i++) pages.push(i); }
  else {
    pages.push(1);
    if (cur > 3) pages.push('…');
    for (let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++) pages.push(i);
    if (cur < total-2) pages.push('…');
    pages.push(total);
  }
  pages.forEach(p => {
    if (p==='…') html += `<button class="pg-btn" disabled>…</button>`;
    else html += `<button class="pg-btn ${p===cur?'on':''}" onclick="(${cb})(${p})">${p}</button>`;
  });
  html += `<button class="pg-btn" ${cur>=total?'disabled':''} onclick="(${cb})(${cur+1})">›</button>`;
  ct.innerHTML = html;
}

function showLoading(msg) {
  const el = document.getElementById('loading');
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-msg').style.color = '';
  document.getElementById('loading-retry').style.display = 'none';
  el.classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function showError(msg) {
  document.getElementById('loading-msg').textContent = '⚠ 無法連線：' + msg;
  document.getElementById('loading-msg').style.color = '#dc2626';
  document.getElementById('loading-retry').style.display = 'block';
}

let toastTimer;
function showToast(icon, msg) {
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
